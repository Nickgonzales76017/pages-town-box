name: Bonfyre Pipeline — Town in a Box
on:
  push:
    branches: [main]
    paths: ['input/**']
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: bonfyre-pipeline
  cancel-in-progress: false

jobs:
  runtime:
    uses: Nickgonzales76017/bonfyre-oss/.github/workflows/pages-runtime.yml@main
    with:
      app_name: Town in a Box
      input_glob: input/**
      process_script: scripts/process-inputs.sh
      deploy_path: site
      artifact_name: pages-town-box-runtime
